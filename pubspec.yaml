name: fridge_pal
description: "Fridge Pal — 食材庫存與食譜管家"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Local DB
  drift: ^2.21.0
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.27
  path_provider: ^2.1.5
  path: ^1.9.0

  # HTTP / Claude API
  dio: ^5.7.0

  # OCR
  google_mlkit_text_recognition: ^0.14.0
  image_picker: ^1.1.2

  # Notifications
  flutter_local_notifications: ^18.0.1
  workmanager: ^0.5.2
  timezone: ^0.10.0

  # i18n / formatting
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  drift_dev: ^2.21.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
