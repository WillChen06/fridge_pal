name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    name: Claude reviews the diff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Use a single rolling sticky comment instead of spamming new
          # comments on every push to the PR.
          use_sticky_comment: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            你是這個 Flutter (Dart) 專案 Fridge Pal 的程式碼 reviewer。請針對這個 PR 的 diff 給意見。

            **檢查重點**：

            1. **Dart / Flutter 慣例**：null safety、`const` 用法、widget 拆分、避免在 build 內做 heavy work。
            2. **State management**：Riverpod provider 是否正確 dispose、避免在 build 內 read。
            3. **Drift schema migration**：若改 table 是否補 migration、欄位變更是否破壞既有資料。
            4. **API key / 機密**：絕不能在程式或 commit 中出現 `sk-ant-` 開頭字串、Telegram token、其他 secret。
            5. **commit 顆粒度**：是否每個 commit 為一個小邏輯單元、訊息符合 Conventional Commits（`feat:` `fix:` `chore:` ...）。
            6. **測試**：新功能是否有單元測試或 widget 測試。
            7. **平台差異**：iOS / Android 權限或設定（相機、通知）是否兩邊都補。

            **輸出規則（重要 — 不照做使用者看不到 review）**：

            - **必須**用 `gh pr comment ${{ github.event.pull_request.number }} --body "..."` 在 PR 上留一段總結 comment，無論結論如何。
            - 若 diff 沒問題：comment 內容用單行 `✅ LGTM — <一句話說明為何 OK>`。
            - 若有意見：comment 內分兩段
              - **Must fix**（會破壞功能 / 安全）
              - **Nice to have**（風格 / 可選優化）
              每點寫清楚檔案路徑與行號。針對特定行的問題請改用 `mcp__github_inline_comment__create_inline_comment` 留 inline comment（記得帶 `confirmed: true`），最後再用 `gh pr comment` 留總結。
            - 不要硬擠雞蛋裡挑骨頭的意見——沒重大問題寧可只給 LGTM。
            - 不要 approve / request changes（不送 review state），讓人類保留最終 merge 決定權。
            - **只透過 GitHub comment 與使用者溝通，不要把 review 內容當成 message 輸出而已。**
          claude_args: |
            --model claude-sonnet-4-6
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
