name: Notify Telegram on Merge

on:
  push:
    branches: [main]

jobs:
  telegram:
    name: Send Telegram message
    runs-on: ubuntu-latest
    steps:
      - name: Send merge notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not configured — skipping notification."
            exit 0
          fi

          TEXT=$(printf '🥬 *Fridge Pal* — merged to main\n\n*Repo:* %s\n*Author:* %s\n*Commit:*\n%s\n\n%s' \
            "$REPO" "$COMMIT_AUTHOR" "$COMMIT_MSG" "$COMMIT_URL")

          curl -sS --fail-with-body \
            -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="Markdown" \
            --data-urlencode text="${TEXT}"
